<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Random Quote Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e12;
      --card: #16161e;
      --border: #2a2a38;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text: #f0ece4;
      --muted: #7a7a8e;
      --accent: #3a3a52;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .app-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.8rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2.5rem;
      opacity: 0.9;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 3.5rem 3rem 2.5rem;
      max-width: 680px;
      width: 100%;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }

    /* Gold corner accent */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 60px; height: 3px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 60px;
      background: linear-gradient(180deg, var(--gold), transparent);
    }

    .quote-icon {
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      line-height: 0.5;
      color: var(--gold);
      opacity: 0.3;
      display: block;
      margin-bottom: 1.5rem;
    }

    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      font-style: italic;
      line-height: 1.7;
      color: var(--text);
      min-height: 120px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .quote-text.fade {
      opacity: 0;
      transform: translateY(8px);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 1.8rem 0 1rem;
      opacity: 0.5;
    }

    .quote-author {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold-light);
      min-height: 20px;
      transition: opacity 0.4s ease;
    }

    .quote-author.fade { opacity: 0; }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .quote-counter {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.75rem 1.8rem;
      cursor: pointer;
      border-radius: 1px;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
      z-index: -1;
    }

    .btn:hover {
      color: var(--bg);
    }
    .btn:hover::before { transform: scaleX(1); }

    .btn:active { transform: scale(0.97); }

    .copy-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
      padding: 0;
    }
    .copy-btn:hover { color: var(--gold-light); }

    .copied-msg {
      font-size: 0.72rem;
      color: var(--gold);
      opacity: 0;
      margin-top: 0.5rem;
      text-align: right;
      transition: opacity 0.3s;
      letter-spacing: 0.08em;
    }
    .copied-msg.show { opacity: 1; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeIn 0.7s ease forwards; }
  </style>
</head>
<body>

  <p class="app-title">✦ Quote of the Moment</p>

  <div class="card">
    <span class="quote-icon">"</span>
    <p class="quote-text" id="quoteText"></p>
    <div class="divider"></div>
    <p class="quote-author" id="quoteAuthor"></p>

    <div class="actions">
      <span class="quote-counter" id="counter"></span>
      <div style="display:flex; gap:1rem; align-items:center;">
        <button class="copy-btn" onclick="copyQuote()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="btn" onclick="newQuote()">New Quote</button>
      </div>
    </div>
    <p class="copied-msg" id="copiedMsg">Copied to clipboard ✓</p>
  </div>

  <script>
    const quotes = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
      { text: "Life is what happens when you're busy making other plans.", author: "John Lennon" },
      { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
      { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
      { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
      { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins" },
      { text: "In three words I can sum up everything I've learned about life: it goes on.", author: "Robert Frost" },
      { text: "To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.", author: "Ralph Waldo Emerson" },
      { text: "Spread love everywhere you go. Let no one ever come to you without leaving happier.", author: "Mother Teresa" },
      { text: "When you reach the end of your rope, tie a knot in it and hang on.", author: "Franklin D. Roosevelt" },
      { text: "Always remember that you are absolutely unique. Just like everyone else.", author: "Margaret Mead" },
      { text: "Do not go where the path may lead, go instead where there is no path and leave a trail.", author: "Ralph Waldo Emerson" },
      { text: "You will face many defeats in life, but never let yourself be defeated.", author: "Maya Angelou" },
      { text: "The greatest glory in living lies not in never falling, but in rising every time we fall.", author: "Nelson Mandela" },
      { text: "In the end, it's not the years in your life that count. It's the life in your years.", author: "Abraham Lincoln" },
      { text: "Never let the fear of striking out keep you from playing the game.", author: "Babe Ruth" },
      { text: "Life is either a daring adventure or nothing at all.", author: "Helen Keller" },
      { text: "Many of life's failures are people who did not realize how close they were to success when they gave up.", author: "Thomas A. Edison" },
    ];

    let currentIndex = -1;
    let usedIndices = [];

    function newQuote() {
      const textEl = document.getElementById('quoteText');
      const authorEl = document.getElementById('quoteAuthor');
      const counterEl = document.getElementById('counter');

      textEl.classList.add('fade');
      authorEl.classList.add('fade');

      setTimeout(() => {
        if (usedIndices.length === quotes.length) usedIndices = [];
        let idx;
        do { idx = Math.floor(Math.random() * quotes.length); }
        while (usedIndices.includes(idx));
        usedIndices.push(idx);
        currentIndex = idx;

        textEl.textContent = quotes[idx].text;
        authorEl.textContent = '— ' + quotes[idx].author;
        counterEl.textContent = usedIndices.length + ' / ' + quotes.length + ' shown';

        textEl.classList.remove('fade');
        authorEl.classList.remove('fade');
      }, 350);
    }

    function copyQuote() {
      if (currentIndex === -1) return;
      const q = quotes[currentIndex];
      navigator.clipboard.writeText(`"${q.text}" — ${q.author}`).then(() => {
        const msg = document.getElementById('copiedMsg');
        msg.classList.add('show');
        setTimeout(() => msg.classList.remove('show'), 2000);
      });
    }

    // Load first quote on start
    newQuote();
  </script>
</body>
</html>
