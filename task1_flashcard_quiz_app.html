<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcard Quiz App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --card-front: #ffffff;
      --card-back: #1e293b;
      --ink: #1e293b;
      --muted: #94a3b8;
      --accent: #e85d3a;
      --accent2: #3a7ee8;
      --border: #e2d9c8;
      --success: #22c55e;
      --danger: #ef4444;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem 4rem;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
    }

    .logo {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.1;
      color: var(--ink);
    }

    .progress-bar-wrap {
      width: 100%;
      max-width: 520px;
      margin: 0 auto 0.5rem;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 1.5rem;
      letter-spacing: 0.08em;
    }

    /* ── FLIP CARD ── */
    .scene {
      width: 100%;
      max-width: 520px;
      height: 300px;
      perspective: 1200px;
      cursor: pointer;
      margin: 0 auto 1.5rem;
    }

    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-inner.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem;
      text-align: center;
    }

    .card-front {
      background: var(--card-front);
      border: 2px solid var(--border);
      box-shadow: 6px 6px 0 var(--border);
    }

    .card-back {
      background: var(--card-back);
      color: #f8fafc;
      transform: rotateY(180deg);
      box-shadow: 6px 6px 0 #0f172a;
    }

    .card-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .card-back .card-label { color: #64748b; }

    .card-question {
      font-family: 'Lora', serif;
      font-size: 1.35rem;
      line-height: 1.6;
      color: var(--ink);
    }

    .card-answer {
      font-family: 'Lora', serif;
      font-size: 1.25rem;
      line-height: 1.6;
      color: #f1f5f9;
    }

    .flip-hint {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* ── NAVIGATION ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      max-width: 520px;
      width: 100%;
      margin: 0 auto 1.5rem;
    }

    .nav-btn {
      background: var(--ink);
      color: white;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      padding: 0.7rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      max-width: 140px;
    }
    .nav-btn:hover { background: #374151; transform: translateY(-1px); }
    .nav-btn:active { transform: translateY(1px); }
    .nav-btn:disabled { background: var(--border); color: var(--muted); cursor: default; transform: none; }

    .card-num {
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      min-width: 60px;
      text-align: center;
    }

    /* ── ACTIONS ── */
    .actions {
      display: flex;
      gap: 0.75rem;
      max-width: 520px;
      width: 100%;
      margin: 0 auto 2rem;
    }

    .action-btn {
      flex: 1;
      padding: 0.65rem;
      border-radius: 6px;
      border: 2px solid;
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .btn-add { border-color: var(--accent2); color: var(--accent2); background: transparent; }
    .btn-add:hover { background: var(--accent2); color: white; }
    .btn-edit { border-color: var(--accent); color: var(--accent); background: transparent; }
    .btn-edit:hover { background: var(--accent); color: white; }
    .btn-delete { border-color: var(--danger); color: var(--danger); background: transparent; }
    .btn-delete:hover { background: var(--danger); color: white; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
      padding: 1.5rem;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 460px;
      border: 2px solid var(--border);
      box-shadow: 8px 8px 0 var(--border);
      transform: translateY(20px);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--ink); }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .form-group textarea {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid var(--border);
      border-radius: 6px;
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 80px;
      color: var(--ink);
      transition: border-color 0.2s;
    }
    .form-group textarea:focus { outline: none; border-color: var(--accent2); }

    .modal-btns { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1rem; }
    .modal-cancel { background: none; border: 2px solid var(--border); color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.8rem; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; }
    .modal-save { background: var(--accent2); color: white; border: none; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.8rem; padding: 0.6rem 1.4rem; border-radius: 6px; cursor: pointer; }
    .modal-cancel:hover { border-color: var(--muted); }
    .modal-save:hover { background: #2563eb; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-family: 'Lora', serif;
      font-style: italic;
    }

    @keyframes slideUp {
      from { opacity:0; transform: translateY(30px); }
      to { opacity:1; transform: translateY(0); }
    }
    header, .scene, .nav, .actions { animation: slideUp 0.6s ease both; }
    .nav { animation-delay: 0.1s; }
    .actions { animation-delay: 0.2s; }
  </style>
</head>
<body>

  <header>
    <p class="logo">✦ Study Tool</p>
    <h1>Flashcard Quiz</h1>
  </header>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <p class="progress-label" id="progressLabel"></p>

  <div class="scene" onclick="flipCard()" id="scene">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <p class="card-label">Question</p>
        <p class="card-question" id="cardQuestion"></p>
        <p class="flip-hint">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          Click to reveal answer
        </p>
      </div>
      <div class="card-face card-back">
        <p class="card-label">Answer</p>
        <p class="card-answer" id="cardAnswer"></p>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" onclick="prevCard()">← Prev</button>
    <span class="card-num" id="cardNum"></span>
    <button class="nav-btn" onclick="nextCard()">Next →</button>
  </div>

  <div class="actions">
    <button class="action-btn btn-add" onclick="openModal('add')">+ Add Card</button>
    <button class="action-btn btn-edit" onclick="openModal('edit')">✎ Edit</button>
    <button class="action-btn btn-delete" onclick="deleteCard()">✕ Delete</button>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Add Flashcard</h2>
      <div class="form-group">
        <label>Question</label>
        <textarea id="inputQ" placeholder="Enter your question..."></textarea>
      </div>
      <div class="form-group">
        <label>Answer</label>
        <textarea id="inputA" placeholder="Enter the answer..."></textarea>
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-save" onclick="saveCard()">Save Card</button>
      </div>
    </div>
  </div>

  <script>
    let cards = [
      { q: "What does HTML stand for?", a: "HyperText Markup Language — the standard language for creating web pages." },
      { q: "What is the role of CSS in web development?", a: "CSS (Cascading Style Sheets) controls the visual styling and layout of HTML elements." },
      { q: "What is JavaScript primarily used for?", a: "JavaScript adds interactivity and dynamic behavior to web pages." },
      { q: "What is a variable in programming?", a: "A named container that stores a value which can be changed during program execution." },
      { q: "What does the DOM stand for?", a: "Document Object Model — a tree-like representation of a web page's HTML structure." },
    ];

    let current = 0;
    let isFlipped = false;
    let modalMode = 'add';

    function render() {
      const cardInner = document.getElementById('cardInner');
      if (cards.length === 0) {
        document.getElementById('scene').innerHTML = '<div class="empty-state">No flashcards yet.<br/>Click "+ Add Card" to get started!</div>';
        document.getElementById('cardNum').textContent = '0 / 0';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('progressLabel').textContent = 'No cards';
        return;
      }
      // Restore scene if it was replaced
      if (!document.getElementById('cardInner')) {
        document.getElementById('scene').innerHTML = `
          <div class="card-inner" id="cardInner">
            <div class="card-face card-front">
              <p class="card-label">Question</p>
              <p class="card-question" id="cardQuestion"></p>
              <p class="flip-hint">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                Click to reveal answer
              </p>
            </div>
            <div class="card-face card-back">
              <p class="card-label">Answer</p>
              <p class="card-answer" id="cardAnswer"></p>
            </div>
          </div>`;
      }

      if (current >= cards.length) current = cards.length - 1;
      document.getElementById('cardQuestion').textContent = cards[current].q;
      document.getElementById('cardAnswer').textContent = cards[current].a;
      document.getElementById('cardNum').textContent = (current + 1) + ' / ' + cards.length;

      const pct = ((current + 1) / cards.length) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = 'Card ' + (current + 1) + ' of ' + cards.length;

      // Reset flip
      isFlipped = false;
      document.getElementById('cardInner').classList.remove('flipped');
    }

    function flipCard() {
      if (!document.getElementById('cardInner')) return;
      isFlipped = !isFlipped;
      document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
    }

    function nextCard() {
      if (current < cards.length - 1) { current++; render(); }
    }

    function prevCard() {
      if (current > 0) { current--; render(); }
    }

    function openModal(mode) {
      modalMode = mode;
      document.getElementById('modalTitle').textContent = mode === 'add' ? 'Add Flashcard' : 'Edit Flashcard';
      document.getElementById('inputQ').value = mode === 'edit' && cards.length ? cards[current].q : '';
      document.getElementById('inputA').value = mode === 'edit' && cards.length ? cards[current].a : '';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function saveCard() {
      const q = document.getElementById('inputQ').value.trim();
      const a = document.getElementById('inputA').value.trim();
      if (!q || !a) { alert('Please fill in both question and answer.'); return; }

      if (modalMode === 'add') {
        cards.push({ q, a });
        current = cards.length - 1;
      } else {
        cards[current] = { q, a };
      }
      closeModal();
      render();
    }

    function deleteCard() {
      if (cards.length === 0) return;
      if (!confirm('Delete this flashcard?')) return;
      cards.splice(current, 1);
      if (current > 0) current--;
      render();
    }

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    render();
  </script>
</body>
</html>
